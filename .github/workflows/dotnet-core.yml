name: Publish to NuGet

# Triggered automatically when the Tests workflow completes successfully on the
# release branch.  This guarantees that all tests (Ubuntu + Windows × net8/9/10)
# have passed before the package is packed and published.
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [release]

permissions:
  contents: read

jobs:
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    # Only run if the triggering Tests workflow actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET (all TFMs)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Pack NuGet
        run: dotnet pack src/NtfsReader/NtfsReader.csproj --no-build -c Release -o nupkgs

      - name: Verify NUGET_API_KEY secret
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add a valid NuGet.org API key under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push nupkgs/*.snupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
