name: Publish to NuGet

# Triggered automatically when the Tests workflow completes successfully on the
# release branch.  This guarantees that:
#   - All tests (Ubuntu + Windows × net8/9/10) have passed.
#   - The NuGet package is the exact artifact produced during that test run.
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [release]

permissions:
  contents: read
  actions: read   # needed to download artifacts from the triggering workflow run

jobs:
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    # Only run if the triggering Tests workflow actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download NuGet packages from test run
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: nupkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Push to NuGet
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push nupkgs/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
